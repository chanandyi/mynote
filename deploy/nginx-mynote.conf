# mynote — 仅 HTTP，反代到本机 Node（默认 3000）
#
# 使用方式（Ubuntu 示例）：
#   sudo cp deploy/nginx-mynote.conf /etc/nginx/sites-available/mynote
#   编辑 server_name、若 Node 端口不是 3000 则改 proxy_pass
#   sudo ln -sf /etc/nginx/sites-available/mynote /etc/nginx/sites-enabled/mynote
#   sudo nginx -t && sudo systemctl reload nginx
#
# 环境变量 PUBLIC_BASE_URL 应与浏览器访问一致，例如：
#   http://你的域名   或   http://公网IP  （不要带 :3000）

upstream mynote_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # 改为你的域名，或暂时用 _ 表示任意 Host
    server_name _;

    # 与 multer 上传限制一致或略大（字节约 8MB，这里给足余量）
    client_max_body_size 20m;

    # 可选：限制请求体缓冲，大文件走临时文件
    client_body_buffer_size 128k;

    location / {
        proxy_pass http://mynote_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 上传图片时适当拉长超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 可选：禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
